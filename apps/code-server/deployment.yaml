---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server
  namespace: apps
  labels:
    app: code-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-server
  template:
    metadata:
      labels:
        app: code-server
    spec:
      containers:
        - name: code-server
          image: codercom/code-server:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              sudo apt-get update
              sudo apt-get install -y python3 python3-pip python3-venv curl
              curl -LsSf https://astral.sh/uv/install.sh | /bin/bash
              export PATH="/home/coder/.local/bin:$PATH"
              # run code-server
              exec dumb-init /usr/bin/entrypoint.sh --bind-addr 0.0.0.0:8080 .
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          volumeMounts:
            - mountPath: /home/coder/project
              name: code-server-data
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: code-server-data
          persistentVolumeClaim:
            claimName: code-server-pvc
